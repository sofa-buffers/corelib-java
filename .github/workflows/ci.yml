name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & test (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Minimum supported release (pom maven.compiler.release) plus current LTS.
        java: ['17', '21']
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      # `verify` runs the JUnit suite and produces the JaCoCo coverage report
      # at target/site/jacoco/jacoco.{xml,csv}.
      - name: Build & test (with coverage)
        run: mvn -B verify

  coverage-badge:
    name: Coverage
    runs-on: ubuntu-latest
    needs: build-test
    # Only refresh the badge for the canonical branch, never for PR forks.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build & test (with coverage)
        run: mvn -B verify

      # Emit shields.io endpoint JSON (coverage.json / branches.json) from the
      # JaCoCo CSV. The README renders these through img.shields.io, so the
      # badge styling comes from shields while the value stays dynamic.
      - name: Generate JaCoCo shields endpoints
        uses: cicirello/jacoco-badge-generator@v2
        with:
          jacoco-csv-file: target/site/jacoco/jacoco.csv
          badges-directory: .badges
          generate-coverage-badge: false
          generate-branches-badge: false
          generate-coverage-endpoint: true
          generate-branches-endpoint: true
          # Default coverage endpoint filename is jacoco.json; the README
          # references coverage.json, so override it to match.
          coverage-endpoint-filename: coverage.json

      # Force-push the freshly rendered SVGs to the orphan `badges` branch. The
      # README references them by raw URL, so the badge shows the new % after
      # every CI run on main. The default GITHUB_TOKEN has enough scope.
      - name: Publish badges to the badges branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./.badges
          publish_branch: badges
          keep_files: false
          commit_message: 'Update coverage badges for ${{ github.sha }}'
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
