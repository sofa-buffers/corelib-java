name: Javadoc

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions needed to deploy to GitHub Pages from Actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one Pages deployment at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Javadoc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Generates HTML into target/reports/apidocs (bench package excluded).
      - name: Generate Javadoc
        run: mvn -B -DskipTests javadoc:javadoc

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages (Actions source) so no manual repo setting is needed.
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: target/reports/apidocs

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
